services:
  postgres:
    image: 'postgres:latest'
    container_name: rpg-postgres
    environment:
      - 'POSTGRES_DB=rpg_fichas'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5453:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - rpg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d rpg_fichas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development # Use development stage with hot-reload
    container_name: rpg-backend
    ports:
      - '8081:8081'
    environment:
      - 'SPRING_PROFILES_ACTIVE=dev'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rpg_fichas'
      - 'SPRING_DATASOURCE_USERNAME=myuser'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
      - 'GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}'
      # Fix OAuth2 redirect_uri to use localhost instead of container name
      - 'SERVER_FORWARD_HEADERS_STRATEGY=framework'
    volumes:
      # Mount entire project for hot reload
      - .:/app:cached
      # Exclude target from host (use container's version)
      - /app/target
      # Maven cache
      - maven-cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rpg-network
    restart: unless-stopped

  frontend:
    build:
      context: ../ficha-controlador-front-end/ficha-controlador-front-end
      dockerfile: Dockerfile
      target: development # Use development stage
    container_name: rpg-frontend
    ports:
      - '4201:4201'
      - '49173:49153' # Angular live reload
    environment:
      - 'NODE_ENV=development'
    volumes:
      # Mount source code for hot reload
      - ../ficha-controlador-front-end/ficha-controlador-front-end/src:/app/src:rw
      - ../ficha-controlador-front-end/ficha-controlador-front-end/angular.json:/app/angular.json:ro
      - ../ficha-controlador-front-end/ficha-controlador-front-end/tsconfig.json:/app/tsconfig.json:ro
      - ../ficha-controlador-front-end/ficha-controlador-front-end/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ../ficha-controlador-front-end/ficha-controlador-front-end/package.json:/app/package.json:rw
      - ../ficha-controlador-front-end/ficha-controlador-front-end/package-lock.json:/app/package-lock.json:rw
      - ../ficha-controlador-front-end/ficha-controlador-front-end/proxy.conf.json:/app/proxy.conf.json:ro
      # Exclude node_modules from host
      - /app/node_modules
      - /app/.angular
    depends_on:
      - backend
    networks:
      - rpg-network
    restart: unless-stopped
    command: npm start -- --host 0.0.0.0 --port 4201 --poll=2000

volumes:
  postgres_data:
  maven-cache:

networks:
  rpg-network:
    driver: bridge
