services:
  postgres:
    image: postgres:16-alpine
    container_name: rpg-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rpg_fichas}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bind em todas as interfaces — seguro porque:
      # 1. Firewall GCP permite 5432 APENAS da rede VPC interna (10.128.0.0/20)
      # 2. UFW na VM tambem restringe 5432 a rede VPC interna
      # 3. Porta 5432 e INVISIVEL para a internet publica
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${POSTGRES_DB:-rpg_fichas}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 384m

volumes:
  pgdata:
    driver: local
