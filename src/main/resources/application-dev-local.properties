# Development Profile - Sem OAuth2 obrigatório
spring.config.activate.on-profile=dev-local

# OAuth2 Google (Opcional para dev local)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dummy-client-id-for-local-dev}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dummy-secret-for-local-dev}

# Database H2 em memória para testes locais (opcional)
