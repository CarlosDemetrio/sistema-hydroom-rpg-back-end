services:
  postgres:
    image: 'postgres:latest'
    container_name: rpg-postgres
    environment:
      - 'POSTGRES_DB=rpg_fichas'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=myuser'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - rpg-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rpg-backend
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_PROFILES_ACTIVE=dev'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/rpg_fichas'
      - 'SPRING_DATASOURCE_USERNAME=myuser'
      - 'SPRING_DATASOURCE_PASSWORD=secret'
      - 'GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rpg-network
    restart: unless-stopped

  frontend:
    build:
      context: ../ficha-controlador-front-end/ficha-controlador-front-end
      dockerfile: Dockerfile
    container_name: rpg-frontend
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - rpg-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  rpg-network:
    driver: bridge
