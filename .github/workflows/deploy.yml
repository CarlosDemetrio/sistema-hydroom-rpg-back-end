name: 🚀 Deploy Backend to OCI

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag da imagem Docker (default: latest)'
        required: false
        default: 'latest'
        type: string
      skip_tests:
        description: 'Pular testes antes do deploy?'
        required: false
        default: false
        type: boolean
      deploy_only:
        description: 'Apenas deploy (sem build — usa imagem existente)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ficha-controlador

jobs:
  # ══════════════════════════════════════════════════
  # Job 1: Rodar testes
  # ══════════════════════════════════════════════════
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_tests && !inputs.deploy_only }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: 🧪 Executar testes
        run: ./mvnw test -B --no-transfer-progress

      - name: 📊 Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  # ══════════════════════════════════════════════════
  # Job 2: Build e Push da imagem Docker
  # ══════════════════════════════════════════════════
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: ${{ !inputs.deploy_only && always() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup QEMU (cross-compilation ARM64)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: 🔧 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.image_tag || 'latest' }}
            type=sha,prefix=,format=short

      - name: 🏗️ Build e Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: production
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📋 Resumo do Build
        run: |
          echo "### 🐳 Imagem Docker" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest**: ${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Plataforma**: linux/arm64" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════
  # Job 3: Deploy no OCI via SSH
  # ══════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy OCI
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: ${{ always() && (needs.build-and-push.result == 'success' || inputs.deploy_only) }}
    environment: production

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_VM_HOST }}
          username: ${{ secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "🔄 Iniciando deploy..."
            cd /opt/app

            # Login no GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Atualizar tag se necessário
            export IMAGE_TAG="${{ inputs.image_tag || 'latest' }}"

            # Backup do estado atual (para rollback)
            docker compose -f docker-compose.prod.yml ps > /opt/backups/deploy-state-$(date +%Y%m%d-%H%M%S).txt 2>&1 || true

            # Pull da nova imagem
            echo "📦 Pulling imagem..."
            docker compose -f docker-compose.prod.yml pull backend

            # Deploy com zero-downtime (restart apenas backend)
            echo "🔄 Restarting backend..."
            docker compose -f docker-compose.prod.yml up -d --no-deps backend

            # Aguardar health check
            echo "⏳ Aguardando health check..."
            sleep 20

            # Verificar saúde
            for i in $(seq 1 6); do
              if curl -sf http://localhost:8081/actuator/health/readiness > /dev/null 2>&1; then
                echo "✅ Backend saudável!"
                break
              fi
              if [ "$i" -eq 6 ]; then
                echo "❌ Health check falhou após 60s!"
                echo "📋 Logs do container:"
                docker compose -f docker-compose.prod.yml logs --tail 50 backend
                exit 1
              fi
              echo "⏳ Tentativa $i/6 — aguardando 10s..."
              sleep 10
            done

            # Limpar imagens antigas
            docker image prune -f

            echo "🎉 Deploy concluído com sucesso!"

      - name: 📋 Resumo do Deploy
        if: success()
        run: |
          echo "### 🚀 Deploy Realizado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente**: OCI Free Tier" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: \`${{ secrets.OCI_VM_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`${{ inputs.image_tag || 'latest' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Quando**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Por**: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Notificar falha
        if: failure()
        run: |
          echo "### ❌ Deploy Falhou!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verifique os logs do container via SSH:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "ssh deploy@<VM_IP> 'cd /opt/app && docker compose -f docker-compose.prod.yml logs --tail 100 backend'" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
