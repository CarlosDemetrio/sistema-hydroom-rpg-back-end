name: Deploy Backend to Cloud Run

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Pular testes?'
        type: boolean
        default: false
      build_mode:
        description: 'Modo de build'
        type: choice
        options:
          - native
          - jvm
        default: native

env:
  REGISTRY: us-east1-docker.pkg.dev
  IMAGE_NAME: hydroon-rpg/ficha-controlador/backend
  CLOUD_RUN_SERVICE: rpg-api
  CLOUD_RUN_REGION: us-east1

jobs:
  # -----------------------------------------------
  # Job 1: Testes
  # -----------------------------------------------
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || !inputs.skip_tests }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Executar testes
        run: ./mvnw test -B

  # -----------------------------------------------
  # Job 2: Build Docker + Push GHCR
  # -----------------------------------------------
  build:
    name: 🐳 Build & Push
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      sha_tag: ${{ steps.sha_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Autenticar no GCP (para Artifact Registry)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Login no Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: Determinar Dockerfile
        id: dockerfile
        run: |
          MODE="${{ inputs.build_mode || 'native' }}"
          if [ "$MODE" = "jvm" ]; then
            echo "file=Dockerfile.jvm-cloudrun" >> $GITHUB_OUTPUT
          else
            echo "file=Dockerfile.native" >> $GITHUB_OUTPUT
          fi

      - name: Docker metadata (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Extrair SHA curto para deploy
        id: sha_tag
        run: echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ steps.dockerfile.outputs.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # -----------------------------------------------
  # Job 3: Deploy Cloud Run
  # -----------------------------------------------
  deploy:
    name: 🚀 Deploy Cloud Run
    needs: [build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.sha_tag }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --platform managed \
            --service-account cloud-run-sa@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --vpc-egress all-traffic \
            --network default \
            --subnet default \
            --set-env-vars SPRING_PROFILES_ACTIVE=prod \
            --set-env-vars SPRING_DATASOURCE_URL=jdbc:postgresql://10.142.0.2:5432/rpg_fichas \
            --set-secrets DB_USERNAME=rpg-db-username:latest \
            --set-secrets DB_PASSWORD=rpg-db-password:latest \
            --set-secrets GOOGLE_CLIENT_ID=rpg-google-client-id:latest \
            --set-secrets GOOGLE_CLIENT_SECRET=rpg-google-client-secret:latest \
            --set-secrets FRONTEND_URL=rpg-frontend-url:latest \
            --set-secrets BACKEND_URL=rpg-backend-url:latest \
            --port 8081 \
            --min-instances 0 \
            --max-instances 2 \
            --memory 2Gi \
            --cpu 1 \
            --timeout 60 \
            --quiet

      - name: Verificar deploy (health check)
        run: |
          URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --region ${{ env.CLOUD_RUN_REGION }} \
            --format='value(status.url)')
          echo "Service URL: $URL"
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/actuator/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check falhou! Status: $STATUS"
            echo "Para rollback manual:"
            echo "  gcloud run revisions list --service=${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.CLOUD_RUN_REGION }}"
            echo "  gcloud run services update-traffic ${{ env.CLOUD_RUN_SERVICE }} --region=${{ env.CLOUD_RUN_REGION }} --to-revisions=REVISION=100"
            exit 1
          fi
          echo "✅ Health check passou! Serviço disponível em: $URL"
