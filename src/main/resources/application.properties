# Applicationspring.application.name=ficha-controladorserver.port=8081# Disable Docker Compose support (we're already running in Docker)spring.docker.compose.enabled=false# Database PostgreSQLspring.datasource.url=jdbc:postgresql://localhost:5432/rpg_fichasspring.datasource.username=myuserspring.datasource.password=secretspring.datasource.driver-class-name=org.postgresql.Driver# JPA/Hibernatespring.jpa.hibernate.ddl-auto=updatespring.jpa.show-sql=truespring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialectspring.jpa.properties.hibernate.format_sql=true# Hibernate Envers (Auditing)spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUDspring.jpa.properties.org.hibernate.envers.revision_field_name=REVspring.jpa.properties.org.hibernate.envers.revision_type_field_name=REVTYPEspring.jpa.properties.org.hibernate.envers.store_data_at_delete=truespring.jpa.properties.org.hibernate.envers.global_with_modified_flag=false# Forces Hibernate to use SMALLINT instead of TINYINT (compatible with H2 and PostgreSQL)spring.jpa.properties.hibernate.type.preferred_integer_jdbc_type=SMALLINT# OAuth2 Googlespring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}spring.security.oauth2.client.registration.google.scope=profile,emailspring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}# Session Configuration (Security Enhancement)server.servlet.session.cookie.name=SESSIONIDserver.servlet.session.cookie.http-only=trueserver.servlet.session.cookie.secure=falseserver.servlet.session.cookie.same-site=laxserver.servlet.session.cookie.max-age=1800server.servlet.session.timeout=30mspring.session.store-type=none# CORS Configurationapp.cors.allowed-origins=http://localhost:4201,http://localhost:80# Frontend URL (Externalized)app.frontend.url=http://localhost:4201# Backend URL (Externalized)app.backend.url=http://localhost:8081app.backend.url.prod=https://api.seu-dominio.com# Spring Boot Actuator (Monitoramento Seguro)management.endpoints.web.exposure.include=health,info,metricsmanagement.endpoints.web.base-path=/actuatormanagement.endpoint.health.show-details=when-authorizedmanagement.endpoint.health.probes.enabled=truemanagement.health.livenessState.enabled=truemanagement.health.readinessState.enabled=truemanagement.info.env.enabled=truemanagement.info.git.enabled=truemanagement.prometheus.metrics.export.enabled=false# Info do Actuatorinfo.app.name=Ficha Controlador RPG APIinfo.app.description=API para gerenciamento de fichas de personagens de RPGinfo.app.version=1.0.0info.app.encoding=@project.build.sourceEncoding@info.app.java.version=@java.version@# JWT Configuration (for custom token if needed)app.jwt.secret=${JWT_SECRET:your-super-secret-key-change-this-in-production}app.jwt.expiration=86400000# Logginglogging.level.org.springframework.security=DEBUGlogging.level.org.springframework.web=DEBUGlogging.level.br.com.hydroom.rpg=DEBUG# Rate Limiting Configuration# General endpoints: 100 requests per minute per IPapp.rate-limit.general.capacity=100app.rate-limit.general.refill-duration=PT1M# Auth endpoints: 10 requests per minute per IP (brute force protection)app.rate-limit.auth.capacity=10app.rate-limit.auth.refill-duration=PT1M# Public endpoints: 200 requests per minute per IPapp.rate-limit.public-endpoint.capacity=200app.rate-limit.public-endpoint.refill-duration=PT1M
# Cloudinary (credenciais via variáveis de ambiente)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
