# Production Profile — Cloud Run + GCP
spring.config.activate.on-profile=prod

# -----------------------------------------------
# Server (Cloud Run injeta PORT)
# -----------------------------------------------
server.port=${PORT:8081}
server.forward-headers-strategy=framework

# -----------------------------------------------
# Database PostgreSQL (VM e2-micro via IP INTERNO VPC)
# Cloud Run acessa via Direct VPC Egress
# Ex: jdbc:postgresql://10.128.0.2:5432/rpg_fichas
# NUNCA usar IP publico!
# -----------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rpg_fichas}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable Docker Compose auto-detection in production
spring.docker.compose.enabled=false

# -----------------------------------------------
# Session Configuration (Production - Secure)
# -----------------------------------------------
server.servlet.session.cookie.secure=true
# IMPORTANTE: 'lax' e nao 'strict' - strict bloqueia redirect do Google OAuth2
server.servlet.session.cookie.same-site=lax
server.servlet.session.timeout=30m

# -----------------------------------------------
# URLs (Production)
# -----------------------------------------------
app.frontend.url=${FRONTEND_URL:https://seu-dominio.com}
app.backend.url=${BACKEND_URL:https://api.seu-dominio.com}

# -----------------------------------------------
# CORS Configuration (Production)
# Aceita MULTIPLAS origens separadas por virgula.
# Fallback para FRONTEND_URL caso CORS_ALLOWED_ORIGINS nao esteja definido.
# Exemplo: https://hydrooon.com.br,https://www.hydrooon.com.br
# -----------------------------------------------
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${FRONTEND_URL:https://seu-dominio.com}}

# -----------------------------------------------
# Cloudinary (Galeria de Imagens)
# Credenciais via variaveis de ambiente injetadas pelo Secret Manager
# -----------------------------------------------
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# -----------------------------------------------
# Logging (Production - Structured JSON for Cloud Logging)
# Cloud Run captura stdout e envia ao Cloud Logging automaticamente
# Free tier: 50 GB/mes — com WARN+INFO ficamos bem abaixo do limite
# -----------------------------------------------

# ECS (Elastic Common Schema) - JSON estruturado suportado pelo Spring Boot 4
# Cloud Logging exibe como JSON navegavel no Log Explorer
logging.structured.format.console=ecs

# root=INFO: visibilidade de startup errors; voltar para WARN depois de estabilizado
logging.level.root=INFO
# app=INFO: operacoes do negocio aparecem (criacao, login, erros de validacao)
logging.level.br.com.hydroom.rpg=INFO
# Evitar spam de SQL, security e web em prod
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.zaxxer.hikari=WARN

# -----------------------------------------------
# OAuth2 Google
# -----------------------------------------------
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# -----------------------------------------------
# Actuator (Production)
# /actuator/health  — público (Cloud Run health probe)
# /actuator/prometheus — protegido por autenticação (OAuth2)
# -----------------------------------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true

# Tags globais em todas as métricas (filtragem no Cloud Monitoring / Grafana)
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=prod

# Métricas de requisições HTTP por endpoint (latência, erros)
management.metrics.web.server.request.autotime.enabled=true

# -----------------------------------------------
# OpenAPI/Swagger (desabilitado em producao)
# -----------------------------------------------
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
