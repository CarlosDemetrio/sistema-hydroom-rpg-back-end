# Development Profilespring.config.activate.on-profile=dev# Database PostgreSQL (Docker)spring.datasource.url=jdbc:postgresql://postgres:5432/rpg_fichasspring.datasource.username=myuserspring.datasource.password=secret# JPA - Update allows Hibernate to create/update tables automaticallyspring.jpa.hibernate.ddl-auto=updatespring.jpa.show-sql=falsespring.jpa.properties.hibernate.format_sql=true# Data Initialization - Execute SQL scripts after schema creationspring.sql.init.mode=alwaysspring.sql.init.data-locations=classpath:data-dev.sqlspring.jpa.defer-datasource-initialization=true# Logginglogging.level.org.springframework.security=INFOlogging.level.org.springframework.web=INFOlogging.level.org.hibernate.SQL=DEBUG# OAuth2 Googlespring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id}spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret}spring.security.oauth2.client.registration.google.scope=profile,emailspring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}