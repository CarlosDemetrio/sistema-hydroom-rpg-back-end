openapi: 3.1.0
info:
  title: Klayrah RPG - Auth API
  description: API de autenticação e gerenciamento de usuários
  version: 1.0.0
  contact:
    name: Klayrah RPG Team

servers:
  - url: http://localhost:8080/api/v1
    description: Development server
  - url: https://api.klayrah.com/api/v1
    description: Production server

tags:
  - name: Auth
    description: Autenticação OAuth2
  - name: Usuario
    description: Gerenciamento de usuários

paths:
  /auth/me:
    get:
      tags: [Auth]
      summary: Obter dados do usuário autenticado
      operationId: getMe
      security:
        - oauth2: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Fazer logout
      operationId: logout
      security:
        - oauth2: []
      responses:
        '204':
          description: Logout realizado com sucesso
        '401':
          $ref: '#/components/responses/Unauthorized'

  /usuarios/{id}:
    get:
      tags: [Usuario]
      summary: Obter usuário por ID
      operationId: getUsuarioById
      security:
        - oauth2: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Usuario]
      summary: Atualizar usuário (apenas próprio perfil)
      operationId: updateUsuario
      security:
        - oauth2: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AtualizarUsuarioRequest'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsuarioResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
          tokenUrl: https://oauth2.googleapis.com/token
          scopes:
            openid: OpenID Connect
            email: Email address
            profile: Profile information

  schemas:
    UsuarioResponse:
      type: object
      required:
        - id
        - email
        - nome
        - ativo
        - criadoEm
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: "usuario@email.com"
        nome:
          type: string
          example: "João Silva"
        imagemUrl:
          type: string
          format: uri
          example: "https://lh3.googleusercontent.com/..."
        ativo:
          type: boolean
          example: true
        criadoEm:
          type: string
          format: date-time
          example: "2026-02-01T10:00:00Z"

    AtualizarUsuarioRequest:
      type: object
      properties:
        nome:
          type: string
          minLength: 2
          maxLength: 100
          example: "João Silva"

    ProblemDetail:
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          example: "https://api.klayrah.com/errors/not-found"
        title:
          type: string
          example: "Resource Not Found"
        status:
          type: integer
          example: 404
        detail:
          type: string
          example: "Usuario with id 123 not found"
        instance:
          type: string
          format: uri
          example: "/api/v1/usuarios/123"

  responses:
    BadRequest:
      description: Requisição inválida
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Unauthorized:
      description: Não autenticado
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Forbidden:
      description: Acesso negado
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: Recurso não encontrado
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
